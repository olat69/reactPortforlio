<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 320" role="img">
<title>Temitope.SWE — Temitope Olaniyan</title>
<desc>Clean minimal logo with Temitope.SWE handle matching olat69 portfolio aesthetic</desc>

<style>
  @media (prefers-color-scheme: light) {
    .bg { fill: #eef4f7; }
    .name-text { fill: #0d1117; }
    .label-text { fill: #556677; }
    .rule { stroke: #c8d8e0; }
    .rule-teal { stroke: #2ec4b6; }
    .handle-text { fill: #2ec4b6; }
  }

  .bg { fill: #0d1117; }
  .name-text { fill: #f0f4f8; }
  .label-text { fill: #8899aa; }
  .rule { stroke: #2a3a4a; }
  .rule-teal { stroke: #2ec4b6; }
  .handle-text { fill: #2ec4b6; }

  .handle-group {
    opacity: 0;
    animation: slideRight 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.2s;
  }
  .wordmark-group {
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) forwards 0.4s;
  }
  .rule-draw {
    stroke-dasharray: 580;
    stroke-dashoffset: 580;
    animation: drawLine 0.9s ease forwards 1.0s;
  }
  .rule-draw-thin {
    stroke-dasharray: 580;
    stroke-dashoffset: 580;
    animation: drawLine 1s ease forwards 0.3s;
  }
  .label-group {
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 1.2s;
  }
  .sublabel-group {
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 1.4s;
  }

  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-28px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

<rect x="0" y="0" width="680" height="320" class="bg"/>

<!-- Handle -->
<g class="handle-group">
  <text x="58" y="52"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="12" font-weight="500" letter-spacing="1"
    class="handle-text">olat69</text>
</g>

<!-- Top rule -->
<line x1="58" y1="64" x2="622" y2="64" stroke-width="0.5" class="rule rule-draw-thin"/>

<!-- Single text element — Temitope in white, .SWE in teal, font-size tuned to fit 58–622 -->
<g class="wordmark-group">
  <text x="58" y="170"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="76" font-weight="200" letter-spacing="-2">
    <tspan class="name-text">Temitope</tspan><tspan font-weight="700" fill="#2ec4b6">.SWE</tspan>
  </text>
</g>

<!-- Teal underline -->
<line x1="58" y1="186" x2="622" y2="186" stroke-width="1.5" class="rule-teal rule-draw"/>

<!-- Full name -->
<g class="label-group">
  <text x="58" y="218"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="400" letter-spacing="5"
    class="label-text">TEMITOPE OLANIYAN</text>
</g>

<!-- Stack -->
<g class="sublabel-group">
  <text x="58" y="240"
    font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="9" font-weight="500" letter-spacing="4"
    class="handle-text">FULL-STACK · DEVOPS · BACKEND</text>
</g>

<!-- Bottom rule -->
<line x1="58" y1="268" x2="622" y2="268" stroke-width="0.5" class="rule rule-draw-thin"/>

</svg>
